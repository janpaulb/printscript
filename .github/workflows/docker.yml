name: Build & Push Docker Image

# Triggers:
#   • Push naar main (deploy nieuwste versie)
#   • Versie-tag  (v1.2.3 → getagde release)
#   • Handmatig via de "Run workflow"-knop
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  docker:
    name: Docker image bouwen en pushen
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # nodig voor ghcr.io push

    steps:
      - uses: actions/checkout@v4

      # ── Docker Buildx (multi-platform builds) ──────────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── Inloggen bij GitHub Container Registry ─────────────────────────────
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Tags berekenen ─────────────────────────────────────────────────────
      # main-branch  →  ghcr.io/janpaulb/printscript:latest
      # v1.2.3 tag   →  ghcr.io/janpaulb/printscript:1.2.3
      #                  ghcr.io/janpaulb/printscript:1.2
      #                  ghcr.io/janpaulb/printscript:latest
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/janpaulb/printscript
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Image bouwen en pushen ──────────────────────────────────────────────
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Layer-cache via GitHub Actions Cache voor snellere rebuilds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
